site_name: skills
site_description: A personal library of Claude Code skills — reusable units of agent behavior.
site_url: https://khgouldy.github.io/skills/
repo_url: https://github.com/khgouldy/skills
repo_name: khgouldy/skills
edit_uri: edit/main/skills/

# site-src/ is generated by scripts/build-docs.mjs from skills/**/SKILL.md.
# (The tracked docs/ directory holds specs and is intentionally not the site.)
docs_dir: site-src

theme:
  name: material
  icon:
    logo: material/lightning-bolt
    repo: fontawesome/brands/github
  features:
    - navigation.tabs
    - navigation.indexes
    - navigation.sections
    - navigation.top
    - navigation.instant
    - navigation.instant.progress
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tooltips
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - tables
  - toc:
      permalink: true

plugins:
  - search
